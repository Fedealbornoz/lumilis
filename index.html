<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumilis ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
color:white;
background:url('fondos/sakura.jpg') center/cover fixed;
min-height:100vh;
}
.overlay{
background:rgba(255,105,180,.35);
min-height:100vh;
padding:20px;
text-align:center;
backdrop-filter:blur(2px);
}
h1{font-size:4rem;margin-top:40px;text-shadow:2px 2px 8px #000}
.subtitle{font-size:1.2rem;margin:10px 0 25px}
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff69b4;
color:white;
font-size:1rem;
cursor:pointer;
}
#main{display:none}
.card{
background:rgba(255,255,255,.15);
padding:20px;
margin:20px auto;
max-width:900px;
border-radius:20px;
backdrop-filter:blur(5px);
}
#contador{font-size:1.4rem}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}
.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
}
#cartaContenido{display:none;text-align:left;white-space:pre-wrap}
.petalo{
position:fixed;
top:-20px;
font-size:20px;
animation:caer linear forwards;
}
@keyframes caer{
to{transform:translateY(110vh) rotate(360deg);opacity:.3}
}
</style>
</head>
<body>
<div class="overlay">

<div id="inicio">
<h1>🌸 Lumilis 🌸</h1>
<p class="subtitle">Un pequeño rincón creado especialmente para vos ❤️</p>
<button onclick="entrar()">Entrar</button>
</div>

<div id="main">
<h1>🌸 Lumilis 🌸</h1>

<div class="card">
<h2>Desde el 14 de abril de 2026 ❤️</h2>
<p id="contador"></p>
</div>

<div class="card">
<h2>Nuestros recuerdos 📷</h2>
<div class="gallery">
<img src="imagenes/foto1.jpeg">
<img src="imagenes/foto2.jpeg">
<img src="imagenes/foto3.jpeg">
<img src="imagenes/foto4.jpeg">
<img src="imagenes/foto5.jpeg">
<img src="imagenes/foto6.jpeg">
<img src="imagenes/foto7.jpeg">
<img src="imagenes/foto8.jpeg">
</div>
</div>

<div class="card">
<h2>💌 Carta especial</h2>
<p id="estadoCarta"></p>
<button id="btnCarta" onclick="abrirCarta()" disabled>Ver carta</button>
<div id="cartaContenido">

Ludmila:

(Este espacio queda reservado para la carta que Federico va a escribir especialmente para vos ❤️)

</div>
</div>

</div>

<audio id="musica" loop>
<source src="musica/Voyagers.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function entrar(){
document.getElementById('inicio').style.display='none';
document.getElementById('main').style.display='block';
document.getElementById('musica').play().catch(()=>{});
}

const inicioRelacion=new Date("2026-04-14T00:00:00");

function actualizarContador(){
const ahora=new Date();
const diff=ahora-inicioRelacion;

const dias=Math.floor(diff/(1000*60*60*24));
const horas=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutos=Math.floor((diff%(1000*60*60))/(1000*60));
const segundos=Math.floor((diff%(1000*60))/1000);

document.getElementById("contador").innerHTML=
`${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos`;
}
setInterval(actualizarContador,1000);
actualizarContador();

const desbloqueo=new Date("2026-06-22T00:00:00");

function actualizarCarta(){
const ahora=new Date();
const estado=document.getElementById("estadoCarta");
const boton=document.getElementById("btnCarta");

if(ahora>=desbloqueo){
estado.innerHTML="La carta ya puede abrirse ❤️";
boton.disabled=false;
}else{
const diff=desbloqueo-ahora;
const dias=Math.floor(diff/(1000*60*60*24));
const horas=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
estado.innerHTML=`La carta se abrirá el 22/06/2026. Faltan ${dias} días y ${horas} horas ❤️`;
}
}
setInterval(actualizarCarta,1000);
actualizarCarta();

function abrirCarta(){
document.getElementById("cartaContenido").style.display="block";
}

function petalo(){
const p=document.createElement("div");
p.className="petalo";
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*6)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),12000);
}
setInterval(petalo,500);
</script>
</body>
</html>
