<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ludmila ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:white;
}

.container{
    padding:30px;
}

h1{
    font-size:3rem;
}

#contador{
    font-size:1.5rem;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">
    <h1>❤️ Ludmila ❤️</h1>

    <p>
        Desde el día que nos pusimos de novios
    </p>

    <div id="contador"></div>
</div>

<script>

const fechaInicio = new Date("2026-05-10T00:00:00");

function actualizarContador(){

    const ahora = new Date();

    const diferencia = ahora - fechaInicio;

    const dias = Math.floor(diferencia / (1000*60*60*24));

    const horas = Math.floor(
        (diferencia % (1000*60*60*24))
        /(1000*60*60)
    );

    const minutos = Math.floor(
        (diferencia % (1000*60*60))
        /(1000*60)
    );

    document.getElementById("contador").innerHTML =
    `💖 ${dias} días, ${horas} horas y ${minutos} minutos juntos 💖`;
}

actualizarContador();

setInterval(actualizarContador,1000);

</script>

</body>
</html>
